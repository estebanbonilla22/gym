server:
  # Azure App Service asigna PORT dinámicamente; sin esto la app no responde
  port: ${PORT:8080}

security:
  jwt:
    # En producción, sobreescribe este valor con la variable de entorno JWT_SECRET
    secret: ${JWT_SECRET:12345678901234567890123456789012}
    expiration: 86400000

app:
  r2dbc:
    postgres:
      host: ${POSTGRES_HOST:postgres}
      port: ${POSTGRES_PORT:5432}
      database: ${POSTGRES_DB:gymdb}
      username: ${POSTGRES_USER:postgres}
      password: ${POSTGRES_PASSWORD:postgres}
      # Azure exige SSL. En local (Docker) usar POSTGRES_SSL_MODE=disable
      ssl-mode: ${POSTGRES_SSL_MODE:require}
      pool:
        initial-size: 5
        max-size: 20
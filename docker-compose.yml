version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: gym_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sedesdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: gym_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: gym_app
    depends_on:
      - mysql
      - postgres
    ports:
      - "8081:8080"

volumes:
  mysql_data:
  postgres_data: